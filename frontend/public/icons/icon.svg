<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark rounded background -->
  <rect width="512" height="512" rx="96" fill="#09090b"/>

  <!-- Subtle inner border for depth -->
  <rect x="6" y="6" width="500" height="500" rx="92" fill="none" stroke="#27272a" stroke-width="6"/>

  <!-- Letter N — bold, centered, clean -->
  <text
    x="256"
    y="356"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="310"
    font-weight="900"
    fill="#e2e8f0"
    text-anchor="middle"
    letter-spacing="-8"
  >N</text>

  <!-- Small accent dot bottom-right — the "notary" seal feel -->
  <circle cx="368" cy="388" r="24" fill="#6366f1"/>
</svg>
